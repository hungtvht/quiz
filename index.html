<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>TG</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="docs/public/favicon.ico"
    />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: radial-gradient(circle at top left, #0d1117, #000);
        color: #e2e2e2;
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .navbar {
        background: rgba(20, 20, 30, 0.9);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
      }

      .logo {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0dcaf0;
        text-shadow: 0 0 10px rgba(13, 202, 240, 0.6);
        letter-spacing: 1px;
      }

      .section-title {
        text-align: center;
        margin: 50px 0 30px;
        font-weight: 600;
        color: #00d1ff;
        text-shadow: 0 0 20px rgba(0, 209, 255, 0.5);
      }

      .card {
        background: linear-gradient(145deg, #1a1f2b, #0e121a);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        color: #f5f5f5;
        transition: all 0.3s ease;
        height: 100%;
      }

      .card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 0 25px rgba(0, 204, 255, 0.3);
        border-color: #0dcaf0;
      }

      .card-icon {
        font-size: 3rem;
        color: #0dcaf0;
        text-shadow: 0 0 10px rgba(13, 202, 240, 0.6);
      }

      .footer {
        text-align: center;
        margin-top: 80px;
        color: #777;
        font-size: 0.9rem;
      }

      a {
        text-decoration: none;
      }

      @media (max-width: 768px) {
        .card-icon {
          font-size: 2.5rem;
        }
        .logo {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="container navbar navbar-dark px-4 py-3">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <span class="logo"
          ><i class="fa-solid fa-cloud-sun"></i> F.A – The Fun Area</span
        >

        <div class="position-relative text-info">
          <i class="fa-solid fa-universal-access fa-2x"></i>
          <span
            id="visitscounter"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-light text-info"
          >
            👁️
            <span class="visually-hidden">unread messages</span>
          </span>
        </div>
        <button class="btn btn-outline-info btn-sm d-none" id="darkToggle">
          🌙 Dark Mode
        </button>
      </div>
    </nav>

    <!-- Cards -->
    <div class="container">
      <h3 class="section-title">Mời chọn một chức năng</h3>
      <div class="row g-4 justify-content-center">
        <!-- Quiz -->
        <div class="col-md-4">
          <a href="docs/pages/quiz.html">
            <div class="card text-center p-4 h-100">
              <div class="card-icon mb-3">🧠</div>
              <h5 class="fw-bold">Ôn thi - Quiz</h5>
              <p class="text-secondary small">
                Ôn thi trắc nghiệm, nâng cáo kiến thức nghiệp vụ.
              </p>
            </div>
          </a>
        </div>

        <!-- Bảng giá đất -->
        <div class="col-md-4">
          <a href="docs/pages/banggiadat.html">
            <div class="card text-center p-4 h-100">
              <div class="card-icon mb-3">📊</div>
              <h5 class="fw-bold">Tra cứu bảng giá đất</h5>
              <p class="text-secondary small">
                Tìm kiếm thông minh, lọc và hiển thị bảng giá đất theo khu vực,
                đường, địa bàn.
              </p>
            </div>
          </a>
        </div>

        <!-- Hỗ trợ & Tài liệu -->
        <div class="col-md-4">
          <a href="docs/pages/about.html">
            <div class="card text-center p-4 h-100">
              <div class="card-icon mb-3">📚</div>
              <h5 class="fw-bold">About</h5>
              <p class="text-secondary small">Thông tin thêm...</p>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer py-4">
      <p>
        © 2025 <b>XXX</b> | by
        <span class="text-info">Tinh-Giac</span>
      </p>
    </div>

    <!-- Script -->
    <script src="docs/js/custom.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
      // 2. Cấu hình thông tin từ Bước 4
      const firebaseConfig = {
        databaseURL:
          "https://visits-7f5c2-default-rtdb.asia-southeast1.firebasedatabase.app",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // 3. Hàm tăng lượt truy cập (Thay cho recordVisit cũ)
      function recordVisit() {
        const visitRef = db.ref("visits"); // Trỏ thẳng vào node 'visits' đã tạo ở B3

        visitRef.transaction(
          (currentValue) => {
            // Nếu chưa có dữ liệu thì bắt đầu từ 0, ngược lại tăng thêm 1
            return (currentValue || 0) + 1;
          },
          (error, committed, snapshot) => {
            if (committed) {
              const total = snapshot.val();
              console.log("🚀 Tổng lượt truy cập:", total);

              // Cập nhật số lên giao diện
              const counter = document.getElementById("visitscounter");
              if (counter) counter.innerText = formatNumberVN(total);
            }
          },
        );
      }

      // Chạy khi trang tải xong
      document.addEventListener("DOMContentLoaded", recordVisit);
    </script>

    <script>
      const toggleBtn = document.getElementById("darkToggle");
      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("light-mode");
        if (document.body.classList.contains("light-mode")) {
          document.body.style.background = "#f5f5f5";
          document.body.style.color = "#222";
          toggleBtn.textContent = "🌑 Dark Mode";
        } else {
          document.body.style.background =
            "radial-gradient(circle at top left, #0d1117, #000)";
          document.body.style.color = "#f1f1f1";
          toggleBtn.textContent = "🌙 Light Mode";
        }
      });
      document.addEventListener("DOMContentLoaded", async () => {
        //getVisits("visitscounter");
      });
    </script>
  </body>
</html>
